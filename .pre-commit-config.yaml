repos:
  - repo: https://github.com/batmac/pre-commit-zig
    rev: v0.3.0
    hooks:
      - id: zig-fmt
      - id: zig-build
      - id: zig-build-test
  - repo: local
    hooks:
      - id: flowmark
        name: flowmark
        entry: flowmark --auto
        language: system
        types_or: [markdown]
